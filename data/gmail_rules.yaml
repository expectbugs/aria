# Gmail classification rules — curated through interactive session 2026-03-28.
# Loaded by gmail_strategy.py, hot-reloaded on file change.
#
# Priority order in classifier:
#   1. global_content_overrides (verification codes, shipping — override ALL sender rules)
#   2. Active email watches (user-requested alerts from email_watches table)
#   3. content_overrides (per-sender, with optional content_pattern + category)
#   4. always_important
#   5. always_junk
#   6. Conversation threads (YAML + DB auto-detect from SENT emails)
#   7. Tier 2 pattern scoring → Tier 3 AI judgment

# --- Global content overrides (highest priority) ---
global_content_overrides:
  # Verification codes / OTP — important when fresh, junk when expired
  - content_pattern: "verification code|one-time code|\\bOTP\\b|activation link|security code|login code|sign.in code|here.s your.{0,15}code|your code is"
    check_subject_only: true
    max_age_hours: 2
    classification_within: important
    classification_after: junk

  # Delivery imminent — important (P1)
  - content_pattern: "out for delivery|arriving today|delivery today|will be delivered today"
    classification: important
    category: Shipping

  # General shipping/tracking — routine (informational, not actionable)
  - content_pattern: "has shipped|tracking number|shipment confirmation|shipping confirmation|your.{0,20}has been shipped|delivery details|delivery confirmation|package.{0,10}deliver|order.{0,20}deliver|delivery from"
    classification: routine
    category: Shipping

  # Receipts / order confirmations from any sender (including food)
  - content_pattern: "order receipt|transaction receipt|receipt for \\$|payment of \\$|your.{0,20}order.{0,30}confirmed|we got your order|purchase complete|receipt for order|order has been confirmed|order confirmation|check #\\d"
    classification: routine
    category: Financial

  # Financial transactions from any sender (specific beats general)
  - content_pattern: "payment.{0,15}(processed|confirmed|received|completed|scheduled|went through|successful)|thank you for.{0,40}payment|payment of \\$\\d|charged \\$\\d|your.{0,15}bill.{0,15}paid|auto.?pay.{0,15}(set|scheduled|processed)|settlement offer"
    classification: routine
    category: Financial

# --- Auto-cleanup (trash after time window) ---
auto_cleanup:
  - sender_pattern: "shirtpunch"
    max_age_hours: 24
    action: trash

# --- Always important (simple, no category needed) ---
